name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Build & package VSIX
        working-directory: extension
        run: |
          npm run package
          npx vsce package --no-dependencies

      - name: Get VSIX filename
        id: vsix
        run: echo "path=$(ls extension/*.vsix)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vsix.outputs.path }}
          generate_release_notes: true
          body: |
            ## Instalación

            1. Descarga el archivo `.vsix` de los adjuntos de abajo
            2. En VS Code: **Extensions** → botón `···` → **Install from VSIX…**
            3. Selecciona el archivo descargado y recarga VS Code

            ## Uso

            Abre Copilot Chat y escribe `@copilot-agents /help` para ver los agentes disponibles.

            > Los agentes se actualizan automáticamente desde el repositorio al arrancar VS Code.
